name: CI
on:
  pull_request:
    types: [opened, synchronize, reopened] # these are the defaults - synchronize means 'commits pushed to PR'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  golang-ci:
    uses: cccteam/github-workflows/.github/workflows/golang-ci.yml@775392fadc74a66f043147935dfce7b8f7ad19a8 # v6.1.3
    with:
      build-tags: '["", "collect_resource_permissions,dev"]'
      golangci-lint-version: 'v2.12.2'
  semantic-titles:
    uses: cccteam/github-workflows/.github/workflows/semantic-pull-request-title.yml@775392fadc74a66f043147935dfce7b8f7ad19a8 # v6.1.3
