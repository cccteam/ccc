name: CI
on:
  pull_request:
    types: [opened, synchronize, reopened] # these are the defaults - synchronize means 'commits pushed to PR'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  golang-ci:
    uses: cccteam/github-workflows/.github/workflows/golang-ci.yml@5be491dfaa55f4e80e42bbef5dbe7ca7027f612f # v6.1.1
    with:
      build-tags: '["", "collect_resource_permissions,dev"]'
      golangci-lint-version: 'v2.11.2'
  semantic-titles:
    uses: cccteam/github-workflows/.github/workflows/semantic-pull-request-title.yml@5be491dfaa55f4e80e42bbef5dbe7ca7027f612f # v6.1.1
